# Power Manager v6 - HA Helpers (English)
# Add to configuration.yaml or create via UI

input_text:
  power_manager_status:
    name: Power Manager Status
    max: 255
  power_manager_plan:
    name: Power Manager Plan
    max: 255
  power_manager_actions:
    name: Power Manager Actions
    max: 255

input_number:
  power_manager_available:
    name: Power Manager Available
    min: -10000
    max: 20000
    step: 1
    unit_of_measurement: W

  pm_limit_peak:
    name: Peak Limit
    min: 1000
    max: 10000
    step: 100
    initial: 2500
    unit_of_measurement: W
    icon: mdi:flash-alert

  pm_limit_off_peak:
    name: Off-Peak Limit
    min: 1000
    max: 10000
    step: 100
    initial: 5000
    unit_of_measurement: W
    icon: mdi:flash

  pm_limit_super_off_peak:
    name: Super Off-Peak Limit
    min: 1000
    max: 15000
    step: 100
    initial: 8000
    unit_of_measurement: W
    icon: mdi:flash-outline

# === OVERRIDE CONTROLS ===
# For manual control - PM respects these choices

input_select:
  pm_override_ac_living:
    name: AC Living Room
    options:
      - "Auto"
      - "Cool"
      - "Heat"
      - "Off"
    initial: "Auto"
    icon: mdi:air-conditioner

  pm_override_ac_slaapkamer:
    name: AC Bedroom
    options:
      - "Auto"
      - "Cool"
      - "Heat"
      - "Off"
    initial: "Auto"
    icon: mdi:air-conditioner

  pm_override_ac_bureau:
    name: AC Office
    options:
      - "Auto"
      - "Cool"
      - "Heat"
      - "Off"
    initial: "Auto"
    icon: mdi:air-conditioner

  pm_override_ac_mancave:
    name: AC Mancave
    options:
      - "Auto"
      - "Cool"
      - "Heat"
      - "Off"
    initial: "Auto"
    icon: mdi:air-conditioner

  pm_override_pool:
    name: Pool Heating
    options:
      - "Auto"
      - "Heat"
      - "Off"
    initial: "Auto"
    icon: mdi:pool-thermometer

  pm_override_boiler:
    name: Boiler
    options:
      - "Auto"
      - "On"
      - "Off"
    initial: "Auto"
    icon: mdi:water-boiler

  pm_override_ev:
    name: EV Charging
    options:
      - "🤖 Auto"
      - "☀️ Solar"
      - "⚡ Laden"
      - "⏹️ Uit"
