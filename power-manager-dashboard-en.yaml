## Power Manager Dashboard Cards (English)
## Copy to your Lovelace dashboard

# ==========================================
# CARD 1: Climate Control (for family)
# Requires: mushroom cards (HACS)
# ==========================================
type: vertical-stack
cards:
  - type: markdown
    content: |
      ## Climate Control
      Choose **Auto** to let Power Manager decide, or select manually.

  - type: horizontal-stack
    cards:
      - type: custom:mushroom-select-card
        entity: input_select.pm_override_ac_living
        name: Living Room
        icon: mdi:sofa
        fill_container: true
      - type: custom:mushroom-select-card
        entity: input_select.pm_override_ac_slaapkamer
        name: Bedroom
        icon: mdi:bed
        fill_container: true

  - type: horizontal-stack
    cards:
      - type: custom:mushroom-select-card
        entity: input_select.pm_override_ac_bureau
        name: Office
        icon: mdi:desk
        fill_container: true
      - type: custom:mushroom-select-card
        entity: input_select.pm_override_ac_mancave
        name: Mancave
        icon: mdi:gamepad-variant
        fill_container: true

  - type: horizontal-stack
    cards:
      - type: custom:mushroom-select-card
        entity: input_select.pm_override_pool
        name: Pool
        icon: mdi:pool
        fill_container: true
      - type: custom:mushroom-select-card
        entity: input_select.pm_override_boiler
        name: Boiler
        icon: mdi:water-boiler
        fill_container: true

---

# ==========================================
# CARD 2: Simple Version (native HA cards)
# No extra plugins required
# ==========================================
type: vertical-stack
cards:
  - type: markdown
    content: |
      ## Climate
      **Auto** = Power Manager decides

  - type: entities
    entities:
      - entity: input_select.pm_override_ac_living
        name: Living Room
      - entity: input_select.pm_override_ac_slaapkamer
        name: Bedroom
      - entity: input_select.pm_override_ac_bureau
        name: Office
      - entity: input_select.pm_override_ac_mancave
        name: Mancave
      - type: divider
      - entity: input_select.pm_override_pool
        name: Pool
      - entity: input_select.pm_override_boiler
        name: Boiler
      - entity: input_select.pm_override_ev
        name: EV Charging

---

# ==========================================
# CARD 3: Temperature Overview
# ==========================================
type: glance
title: Temperatures
entities:
  - entity: sensor.livingroom_temperature_temperature
    name: Living
  - entity: sensor.bedroom_temperature_temperature
    name: Bedroom
  - entity: sensor.mancave_inside_temperature
    name: Mancave

---

# ==========================================
# CARD 4: Power Manager Status
# ==========================================
type: vertical-stack
cards:
  - type: markdown
    content: |
      ## Power Manager
      {{ states('input_text.power_manager_status') }}

  - type: markdown
    content: |
      ### Plan
      {{ states('input_text.power_manager_plan') | replace(' | ', '\n\n') }}

  - type: markdown
    content: |
      ### Recent Actions
      {{ states('input_text.power_manager_actions') | replace(' | ', '\n\n') }}

---

# ==========================================
# CARD 5: Quick Buttons (for kids)
# Tap = on, Hold = back to Auto
# ==========================================
type: vertical-stack
cards:
  - type: markdown
    content: "## Quick On/Off"

  - type: horizontal-stack
    cards:
      - type: button
        name: Cool Living
        icon: mdi:snowflake
        tap_action:
          action: call-service
          service: input_select.select_option
          data:
            entity_id: input_select.pm_override_ac_living
            option: "Cool"
        hold_action:
          action: call-service
          service: input_select.select_option
          data:
            entity_id: input_select.pm_override_ac_living
            option: "Auto"

      - type: button
        name: Cool Bedroom
        icon: mdi:snowflake
        tap_action:
          action: call-service
          service: input_select.select_option
          data:
            entity_id: input_select.pm_override_ac_slaapkamer
            option: "Cool"
        hold_action:
          action: call-service
          service: input_select.select_option
          data:
            entity_id: input_select.pm_override_ac_slaapkamer
            option: "Auto"

  - type: horizontal-stack
    cards:
      - type: button
        name: All Auto
        icon: mdi:robot
        tap_action:
          action: call-service
          service: script.pm_all_auto
        icon_color: green

      - type: button
        name: All Off
        icon: mdi:power-off
        tap_action:
          action: call-service
          service: script.pm_all_off
        icon_color: red

---

# ==========================================
# CARD 6: Power Overview
# ==========================================
type: vertical-stack
cards:
  - type: markdown
    content: "## Power Overview"

  - type: entities
    entities:
      - entity: sensor.electricity_meter_power_consumption
        name: Grid Import
        icon: mdi:transmission-tower
      - entity: sensor.solaredge_i1_ac_power
        name: Solar Production
        icon: mdi:solar-power
      - type: divider
      - entity: sensor.storage_boiler_power
        name: Boiler
        icon: mdi:water-boiler
      - entity: sensor.pool_heating_current_consumption
        name: Pool Heater
        icon: mdi:pool-thermometer
      - entity: sensor.abb_terra_ac_active_power
        name: EV Charger
        icon: mdi:ev-station

---

# ==========================================
# CARD 7: Season Toggle
# ==========================================
type: entities
title: Season Mode
entities:
  - entity: input_boolean.pool_season
    name: Summer Mode
    icon: mdi:weather-sunny
  - entity: input_boolean.force_heat_boiler
    name: Force Boiler
    icon: mdi:water-boiler-alert

---

