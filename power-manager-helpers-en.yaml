# Power Manager v6 - HA Helpers (English)
# Add to configuration.yaml or create via UI

input_text:
  power_manager_status:
    name: Power Manager Status
    max: 255
  power_manager_plan:
    name: Power Manager Plan
    max: 255
  power_manager_actions:
    name: Power Manager Actions
    max: 255

input_number:
  power_manager_available:
    name: Power Manager Available
    min: -10000
    max: 20000
    step: 1
    unit_of_measurement: W

# === OVERRIDE CONTROLS ===
# For manual control - PM respects these choices

input_select:
  pm_override_ac_living:
    name: AC Living Room
    options:
      - "Auto"
      - "Cool"
      - "Heat"
      - "Off"
    initial: "Auto"
    icon: mdi:air-conditioner

  pm_override_ac_slaapkamer:
    name: AC Bedroom
    options:
      - "Auto"
      - "Cool"
      - "Heat"
      - "Off"
    initial: "Auto"
    icon: mdi:air-conditioner

  pm_override_ac_bureau:
    name: AC Office
    options:
      - "Auto"
      - "Cool"
      - "Heat"
      - "Off"
    initial: "Auto"
    icon: mdi:air-conditioner

  pm_override_ac_mancave:
    name: AC Mancave
    options:
      - "Auto"
      - "Cool"
      - "Heat"
      - "Off"
    initial: "Auto"
    icon: mdi:air-conditioner

  pm_override_pool:
    name: Pool Heating
    options:
      - "Auto"
      - "Heat"
      - "Off"
    initial: "Auto"
    icon: mdi:pool-thermometer

  pm_override_boiler:
    name: Boiler
    options:
      - "Auto"
      - "On"
      - "Off"
    initial: "Auto"
    icon: mdi:water-boiler

  pm_override_ev:
    name: EV Charging
    options:
      - "Auto"
      - "Charge"
      - "Off"
    initial: "Auto"
    icon: mdi:ev-station
