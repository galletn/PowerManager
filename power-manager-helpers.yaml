# Power Manager v5 - HA Helpers
# Voeg toe aan configuration.yaml of maak via UI

input_text:
  power_manager_status:
    name: Power Manager Status
    max: 255
  power_manager_plan:
    name: Power Manager Plan
    max: 255
  power_manager_actions:
    name: Power Manager Actions
    max: 255

input_number:
  power_manager_available:
    name: Power Manager Beschikbaar
    min: -10000
    max: 20000
    step: 1
    unit_of_measurement: W

# === OVERRIDE CONTROLS ===
# Voor manuele bediening - PM respecteert deze keuzes

input_select:
  pm_override_ac_living:
    name: AC Living
    options:
      - "🤖 Auto"
      - "❄️ Koelen"
      - "🔥 Verwarmen"
      - "⏹️ Uit"
    initial: "🤖 Auto"
    icon: mdi:air-conditioner

  pm_override_ac_slaapkamer:
    name: AC Slaapkamer
    options:
      - "🤖 Auto"
      - "❄️ Koelen"
      - "🔥 Verwarmen"
      - "⏹️ Uit"
    initial: "🤖 Auto"
    icon: mdi:air-conditioner

  pm_override_ac_bureau:
    name: AC Bureau
    options:
      - "🤖 Auto"
      - "❄️ Koelen"
      - "🔥 Verwarmen"
      - "⏹️ Uit"
    initial: "🤖 Auto"
    icon: mdi:air-conditioner

  pm_override_ac_mancave:
    name: AC Mancave
    options:
      - "🤖 Auto"
      - "❄️ Koelen"
      - "🔥 Verwarmen"
      - "⏹️ Uit"
    initial: "🤖 Auto"
    icon: mdi:air-conditioner

  pm_override_pool:
    name: Zwembad Verwarming
    options:
      - "🤖 Auto"
      - "🔥 Verwarmen"
      - "⏹️ Uit"
    initial: "🤖 Auto"
    icon: mdi:pool-thermometer

  pm_override_boiler:
    name: Boiler
    options:
      - "🤖 Auto"
      - "🔥 Aan"
      - "⏹️ Uit"
    initial: "🤖 Auto"
    icon: mdi:water-boiler

  pm_override_ev:
    name: EV Laden
    options:
      - "🤖 Auto"
      - "⚡ Laden"
      - "⏹️ Uit"
    initial: "🤖 Auto"
    icon: mdi:ev-station
